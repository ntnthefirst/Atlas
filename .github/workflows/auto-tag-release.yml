name: Auto Tag Release

# Merging into main publishes automatically when that merge bumped the version.
#
# On every push to main this reads package.json and, if no tag exists yet for
# that version, creates and pushes `v<version>` and then calls the Release
# workflow to lint, build and publish the installers. If the version is
# unchanged (its tag already exists) the run is a no-op, so ordinary merges
# never publish anything.
#
# Pre-releases: a version containing `-beta` (e.g. 1.2.0-beta.0), or a
# `"beta": true` field in package.json, publishes the release as a pre-release.
#
# Note: the tag is created with GITHUB_TOKEN, and a tag pushed by GITHUB_TOKEN
# cannot trigger `on: push`. That's why the Release workflow is invoked here as
# a reusable workflow rather than being left to fire off the tag.
on:
    push:
        branches:
            - main

concurrency:
    group: auto-tag-release
    cancel-in-progress: false

jobs:
    detect:
        name: Detect version bump
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            should_release: ${{ steps.decide.outputs.should_release }}
            tag: ${{ steps.decide.outputs.tag }}
            prerelease: ${{ steps.decide.outputs.prerelease }}
        steps:
            - uses: actions/checkout@v4
              with:
                  # Full history + tags, so we can tell whether this version was
                  # already released.
                  fetch-depth: 0

            - name: Decide whether this push should release
              id: decide
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  BETA=$(node -p "require('./package.json').beta === true")
                  TAG="v$VERSION"

                  # A -beta version string is a pre-release too, regardless of the flag.
                  case "$VERSION" in
                    *-beta*) BETA=true ;;
                  esac

                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  echo "prerelease=$BETA" >> "$GITHUB_OUTPUT"

                  if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
                    echo "Version $VERSION is already released as $TAG — nothing to do."
                    echo "should_release=false" >> "$GITHUB_OUTPUT"
                  else
                    echo "Version bumped to $VERSION — releasing $TAG (prerelease=$BETA)."
                    echo "should_release=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Create and push the tag
              if: steps.decide.outputs.should_release == 'true'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git tag "${{ steps.decide.outputs.tag }}"
                  git push origin "${{ steps.decide.outputs.tag }}"

    release:
        name: Build and publish
        needs: detect
        if: needs.detect.outputs.should_release == 'true'
        permissions:
            contents: write
        uses: ./.github/workflows/release.yml
        with:
            tag: ${{ needs.detect.outputs.tag }}
            prerelease: ${{ needs.detect.outputs.prerelease == 'true' }}
