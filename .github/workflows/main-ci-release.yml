name: Main CI + Release

on:
    push:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: main-ci-release-${{ github.ref }}
    cancel-in-progress: true

jobs:
    quality:
        name: Lint and Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint --if-present

            - name: Build
              run: npm run build --if-present

    release:
        name: Version, Release and Cleanup
        runs-on: ubuntu-latest
        needs: quality
        outputs:
            created: ${{ steps.version.outputs.created }}
            version: ${{ steps.version.outputs.version }}
        permissions:
            contents: write

        steps:
            - name: Checkout full history
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Determine next semantic version tag
              id: version
              shell: bash
              run: |
                  set -euo pipefail

                  if git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' >/dev/null; then
                    echo "created=false" >> "$GITHUB_OUTPUT"
                    echo "version=" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  latest_tag=$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)

                  if [ -z "$latest_tag" ]; then
                    next_version="v0.1.0"
                    echo "created=true" >> "$GITHUB_OUTPUT"
                    echo "version=$next_version" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  range="$latest_tag..HEAD"
                  commits=$(git log --format=%s%n%b $range)

                  bump="patch"
                  if echo "$commits" | grep -Eq 'BREAKING CHANGE|^[a-zA-Z]+(\([^)]+\))?!:'; then
                    bump="major"
                  elif echo "$commits" | grep -Eq '^feat(\([^)]+\))?:'; then
                    bump="minor"
                  fi

                  base=${latest_tag#v}
                  IFS='.' read -r major minor patch <<< "$base"

                  major=${major:-0}
                  minor=${minor:-0}
                  patch=${patch:-0}

                  case "$bump" in
                    major)
                      major=$((major + 1))
                      minor=0
                      patch=0
                      ;;
                    minor)
                      minor=$((minor + 1))
                      patch=0
                      ;;
                    *)
                      patch=$((patch + 1))
                      ;;
                  esac

                  next_version="v${major}.${minor}.${patch}"
                  echo "created=true" >> "$GITHUB_OUTPUT"
                  echo "version=$next_version" >> "$GITHUB_OUTPUT"

            - name: Create and push git tag
              if: steps.version.outputs.created == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git tag "${{ steps.version.outputs.version }}"
                  git push origin "${{ steps.version.outputs.version }}"

            - name: Create GitHub release
              if: steps.version.outputs.created == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.version }}
                  generate_release_notes: true

            - name: Cleanup old major releases and tags
              if: steps.version.outputs.created == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  REPO: ${{ github.repository }}
                  CURRENT_VERSION: ${{ steps.version.outputs.version }}
              shell: bash
              run: |
                  set -euo pipefail

                  current_major=$(echo "$CURRENT_VERSION" | sed -E 's/^v([0-9]+)\..*/\1/')

                  releases=$(gh api "repos/$REPO/releases?per_page=100")
                  echo "$releases" | jq -c '.[] | {id: .id, tag: .tag_name}' | while read -r rel; do
                    tag=$(echo "$rel" | jq -r '.tag')
                    release_id=$(echo "$rel" | jq -r '.id')

                    if [[ "$tag" =~ ^v([0-9]+)\.[0-9]+\.[0-9]+$ ]]; then
                      tag_major="${BASH_REMATCH[1]}"
                      if [ "$tag_major" -lt "$current_major" ]; then
                        echo "Deleting release and tag for old major: $tag"
                        gh api -X DELETE "repos/$REPO/releases/$release_id" || true
                        gh api -X DELETE "repos/$REPO/git/refs/tags/$tag" || true
                      fi
                    fi
                  done

                  tags=$(gh api "repos/$REPO/git/matching-refs/tags/v" | jq -r '.[].ref' | sed 's#refs/tags/##')
                  while read -r tag; do
                    [ -z "$tag" ] && continue
                    if [[ "$tag" =~ ^v([0-9]+)\.[0-9]+\.[0-9]+$ ]]; then
                      tag_major="${BASH_REMATCH[1]}"
                      if [ "$tag_major" -lt "$current_major" ]; then
                        echo "Deleting leftover old-major tag: $tag"
                        gh api -X DELETE "repos/$REPO/git/refs/tags/$tag" || true
                      fi
                    fi
                  done <<< "$tags"

    windows-installer:
        name: Build and Upload Windows Installer
        runs-on: windows-latest
        needs: [quality, release]
        if: needs.release.outputs.created == 'true'
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build Windows installer
              run: npm run dist

            - name: Create stable latest installer filename
              shell: pwsh
              run: |
                  $installer = Get-ChildItem -Path release -Filter "*.exe" | Where-Object { $_.Name -like "*Setup*" } | Select-Object -First 1
                  if (-not $installer) {
                      Write-Error "No installer .exe found in release folder."
                      exit 1
                  }

                  Copy-Item -Path $installer.FullName -Destination (Join-Path $installer.DirectoryName "Atlas-Setup-latest.exe") -Force

            - name: Upload installer files to release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.release.outputs.version }}
                  files: |
                      release/*.exe
                      release/*.blockmap
