name: Main CI + Multi-Platform Release

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            release_channel:
                description: "Release channel"
                required: true
                default: stable
                type: choice
                options:
                    - stable
                    - beta
            bump:
                description: "Version bump strategy"
                required: true
                default: auto
                type: choice
                options:
                    - auto
                    - patch
                    - minor
                    - major

concurrency:
    group: main-ci-release-${{ github.ref }}
    cancel-in-progress: true

jobs:
    quality:
        name: Lint and Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint --if-present

            - name: Build
              run: npm run build --if-present

    release:
        name: Version and Release
        runs-on: ubuntu-latest
        needs: quality
        outputs:
            created: ${{ steps.version.outputs.created }}
            version: ${{ steps.version.outputs.version }}
            prerelease: ${{ steps.version.outputs.prerelease }}
        permissions:
            contents: write
            pull-requests: read

        steps:
            - name: Checkout full history
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Resolve release strategy
              id: strategy
              uses: actions/github-script@v7
              with:
                  script: |
                      const channelInput = context.eventName === "workflow_dispatch"
                        ? "${{ github.event.inputs.release_channel }}"
                        : "stable";
                      const bumpInput = context.eventName === "workflow_dispatch"
                        ? "${{ github.event.inputs.bump }}"
                        : "auto";

                      const { execSync } = require("node:child_process");

                      function run(command) {
                        return execSync(command, { encoding: "utf8" }).trim();
                      }

                      function parseTag(tag) {
                        const match = tag.match(/^v(\d+)\.(\d+)\.(\d+)(?:-beta\.(\d+))?$/);
                        if (!match) {
                          return null;
                        }
                        return {
                          major: Number.parseInt(match[1], 10),
                          minor: Number.parseInt(match[2], 10),
                          patch: Number.parseInt(match[3], 10),
                          beta: match[4] ? Number.parseInt(match[4], 10) : null,
                        };
                      }

                      function parseStable(tag) {
                        const match = tag.match(/^v(\d+)\.(\d+)\.(\d+)$/);
                        if (!match) {
                          return { major: 0, minor: 0, patch: 0 };
                        }
                        return {
                          major: Number.parseInt(match[1], 10),
                          minor: Number.parseInt(match[2], 10),
                          patch: Number.parseInt(match[3], 10),
                        };
                      }

                      function bumpBaseVersion(latestStableTag, bump) {
                        const version = parseStable(latestStableTag);
                        if (bump === "major") {
                          version.major += 1;
                          version.minor = 0;
                          version.patch = 0;
                        } else if (bump === "minor") {
                          version.minor += 1;
                          version.patch = 0;
                        } else {
                          version.patch += 1;
                        }
                        return `${version.major}.${version.minor}.${version.patch}`;
                      }

                      let latestStable = "v0.0.0";
                      try {
                        const stable = run("git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\\.[0-9]+\\.[0-9]+$' | head -n1");
                        if (stable) latestStable = stable;
                      } catch {
                        latestStable = "v0.0.0";
                      }

                      let latestAny = latestStable;
                      try {
                        const any = run("git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\\.[0-9]+\\.[0-9]+(-beta\\.[0-9]+)?$' | head -n1");
                        if (any) latestAny = any;
                      } catch {
                        latestAny = latestStable;
                      }

                      const parsedLatestAny = parseTag(latestAny);
                      const latestIsBeta = Boolean(parsedLatestAny && parsedLatestAny.beta !== null);
                      const activeBetaBase = latestIsBeta
                        ? `${parsedLatestAny.major}.${parsedLatestAny.minor}.${parsedLatestAny.patch}`
                        : "";

                      let channel = channelInput;
                      let bump = bumpInput;
                      let mode = "stable";
                      let source = context.eventName;

                      if (context.eventName === "workflow_dispatch") {
                        source = "workflow_dispatch";
                        if (latestIsBeta) {
                          mode = channelInput === "beta" ? "beta-continue" : "beta-finalize";
                          bump = "locked";
                        } else {
                          mode = channelInput === "beta" ? "beta-start" : "stable";
                        }
                      }

                      if (context.eventName === "push" && context.ref === "refs/heads/main") {
                        const { owner, repo } = context.repo;
                        const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                          owner,
                          repo,
                          commit_sha: context.sha,
                        });

                        const prs = response.data || [];
                        const mergedPr = prs.find((pr) => pr.merged_at && pr.base?.ref === "main") || prs[0];

                        if (mergedPr) {
                          const labels = (mergedPr.labels || []).map((label) => label.name);
                          const bumpLabels = ["release:patch", "release:minor", "release:major"];
                          const betaLabel = "release:beta";
                          const finalizeBetaLabel = "release:finalize-beta";
                          const selected = labels.filter((label) => bumpLabels.includes(label));
                          const hasBeta = labels.includes(betaLabel);
                          const hasFinalizeBeta = labels.includes(finalizeBetaLabel);

                          if (latestIsBeta) {
                            if (selected.length > 0) {
                              core.setFailed(`Latest release is beta (${latestAny}). Bump labels are blocked until beta is finalized.`);
                              return;
                            }
                            if (hasBeta && hasFinalizeBeta) {
                              core.setFailed(`Use either ${betaLabel} or ${finalizeBetaLabel}, not both.`);
                              return;
                            }
                            if (!hasBeta && !hasFinalizeBeta) {
                              core.setFailed(`Latest release is beta (${latestAny}). Add exactly one of ${betaLabel} or ${finalizeBetaLabel}.`);
                              return;
                            }

                            bump = "locked";
                            channel = hasBeta ? "beta" : "stable";
                            mode = hasBeta ? "beta-continue" : "beta-finalize";
                          } else {
                            if (hasFinalizeBeta) {
                              core.setFailed(`${finalizeBetaLabel} is only allowed when the latest release is beta.`);
                              return;
                            }
                            if (selected.length !== 1) {
                              core.setFailed(`A PR to main must have exactly one bump label: ${bumpLabels.join(", ")}. Found: ${selected.join(", ") || "none"}.`);
                              return;
                            }

                            bump = selected[0].replace("release:", "");
                            channel = hasBeta ? "beta" : "stable";
                            mode = hasBeta ? "beta-start" : "stable";
                          }

                          core.info(`Resolved from PR #${mergedPr.number}: mode=${mode}, bump=${bump}, channel=${channel}, latest=${latestAny}`);
                        } else {
                          core.info("No associated PR found for this commit; falling back to existing auto strategy.");
                          if (latestIsBeta) {
                            core.setFailed(`Latest release is beta (${latestAny}) and no PR labels were found to determine whether to continue beta or finalize beta.`);
                            return;
                          }
                          mode = channel === "beta" ? "beta-start" : "stable";
                        }

                        if (mode === "stable" || mode === "beta-start") {
                          const effectiveBump = bump === "auto" ? "patch (auto)" : bump;
                          const resolvedBase = bump === "auto" ? "computed in version step" : bumpBaseVersion(latestStable, bump);
                          core.info(`Stable-track resolution: bump=${effectiveBump}, base=${resolvedBase}`);
                        }
                      }

                      core.setOutput("channel", channel);
                      core.setOutput("bump", bump);
                      core.setOutput("mode", mode);
                      core.setOutput("latest_stable", latestStable);
                      core.setOutput("latest_any", latestAny);
                      core.setOutput("active_beta_base", activeBetaBase);
                      core.setOutput("source", source);

            - name: Determine next release version
              id: version
              shell: bash
              run: |
                  set -euo pipefail

                  channel="${{ steps.strategy.outputs.channel }}"
                  bump_input="${{ steps.strategy.outputs.bump }}"
                  mode="${{ steps.strategy.outputs.mode }}"
                  active_beta_base="${{ steps.strategy.outputs.active_beta_base }}"
                  latest_stable="${{ steps.strategy.outputs.latest_stable }}"

                  if git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$' >/dev/null; then
                    echo "created=false" >> "$GITHUB_OUTPUT"
                    echo "version=" >> "$GITHUB_OUTPUT"
                    echo "prerelease=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  if [ -z "$latest_stable" ]; then
                    latest_stable="v0.0.0"
                  fi

                  range="$latest_stable..HEAD"
                  commits=$(git log --format=%s%n%b $range || true)

                  bump="$bump_input"
                  if [ "$bump" = "auto" ]; then
                    bump="patch"
                    if echo "$commits" | grep -Eq 'BREAKING CHANGE|^[a-zA-Z]+(\([^)]+\))?!:'; then
                      bump="major"
                    elif echo "$commits" | grep -Eq '^feat(\([^)]+\))?:'; then
                      bump="minor"
                    fi
                  fi

                  base=${latest_stable#v}
                  IFS='.' read -r major minor patch <<< "$base"

                  case "$bump" in
                    major)
                      major=$((major + 1))
                      minor=0
                      patch=0
                      ;;
                    minor)
                      minor=$((minor + 1))
                      patch=0
                      ;;
                    patch)
                      patch=$((patch + 1))
                      ;;
                    *)
                      echo "Unsupported bump strategy: $bump"
                      exit 1
                      ;;
                  esac

                  computed_base_version="${major}.${minor}.${patch}"

                  if [ "$mode" = "beta-continue" ]; then
                    if [ -z "$active_beta_base" ]; then
                      echo "Missing active_beta_base for beta-continue mode"
                      exit 1
                    fi
                    latest_beta=$(git tag --list "v${active_beta_base}-beta.*" --sort=-v:refname | grep -E "^v${active_beta_base}-beta\.[0-9]+$" | head -n1 || true)
                    beta_number=1
                    if [ -n "$latest_beta" ]; then
                      beta_number=$(echo "$latest_beta" | sed -E 's/.*-beta\.([0-9]+)$/\1/')
                      beta_number=$((beta_number + 1))
                    fi
                    next_version="v${active_beta_base}-beta.${beta_number}"
                    is_prerelease="true"
                  elif [ "$mode" = "beta-finalize" ]; then
                    if [ -z "$active_beta_base" ]; then
                      echo "Missing active_beta_base for beta-finalize mode"
                      exit 1
                    fi
                    next_version="v${active_beta_base}"
                    is_prerelease="false"
                  elif [ "$channel" = "beta" ]; then
                    latest_beta=$(git tag --list "v${computed_base_version}-beta.*" --sort=-v:refname | grep -E "^v${computed_base_version}-beta\.[0-9]+$" | head -n1 || true)
                    beta_number=1
                    if [ -n "$latest_beta" ]; then
                      beta_number=$(echo "$latest_beta" | sed -E 's/.*-beta\.([0-9]+)$/\1/')
                      beta_number=$((beta_number + 1))
                    fi
                    next_version="v${computed_base_version}-beta.${beta_number}"
                    is_prerelease="true"
                  else
                    next_version="v${computed_base_version}"
                    is_prerelease="false"
                  fi

                  echo "created=true" >> "$GITHUB_OUTPUT"
                  echo "version=$next_version" >> "$GITHUB_OUTPUT"
                  echo "prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

            - name: Create and push git tag
              if: steps.version.outputs.created == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git tag "${{ steps.version.outputs.version }}"
                  git push origin "${{ steps.version.outputs.version }}"

            - name: Create GitHub release
              if: steps.version.outputs.created == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.version }}
                  prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
                  generate_release_notes: true

    installers:
        name: Build and Publish Installers (${{ matrix.name }})
        runs-on: ${{ matrix.os }}
        needs: [quality, release]
        if: needs.release.outputs.created == 'true'
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: Windows
                      os: windows-latest
                      script: |
                          RELEASE_VERSION="${{ needs.release.outputs.version }}"
                          RELEASE_VERSION="${RELEASE_VERSION#v}"
                          npm run build
                          npx electron-builder --win --publish never --config.extraMetadata.version="$RELEASE_VERSION"
                      asset_glob: |
                          release/Atlas-Setup-Windows-*.exe
                          release/Atlas-Setup-Windows-*.exe.blockmap
                          release/latest*.yml
                    - name: macOS
                      os: macos-latest
                      script: |
                          RELEASE_VERSION="${{ needs.release.outputs.version }}"
                          RELEASE_VERSION="${RELEASE_VERSION#v}"
                          npm run build
                          npx electron-builder --mac --arm64 --publish never --config.extraMetadata.version="$RELEASE_VERSION"
                      asset_glob: |
                          release/Atlas-Setup-macOS-*.dmg
                          release/Atlas-Setup-macOS-*.zip
                          release/latest*.yml

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build and publish platform installer artifacts
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CSC_IDENTITY_AUTO_DISCOVERY: false
              run: ${{ matrix.script }}

            - name: Upload installer assets to release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.release.outputs.version }}
                  files: ${{ matrix.asset_glob }}
