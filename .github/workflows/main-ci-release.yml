name: Main CI + Multi-Platform Release

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            release_channel:
                description: "Release channel"
                required: true
                default: stable
                type: choice
                options:
                    - stable
                    - beta
            bump:
                description: "Version bump strategy"
                required: true
                default: auto
                type: choice
                options:
                    - auto
                    - patch
                    - minor
                    - major

concurrency:
    group: main-ci-release-${{ github.ref }}
    cancel-in-progress: true

jobs:
    quality:
        name: Lint and Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint --if-present

            - name: Build
              run: npm run build --if-present

    release:
        name: Version and Release
        runs-on: ubuntu-latest
        needs: quality
        outputs:
            created: ${{ steps.version.outputs.created }}
            version: ${{ steps.version.outputs.version }}
            prerelease: ${{ steps.version.outputs.prerelease }}
        permissions:
            contents: write

        steps:
            - name: Checkout full history
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Determine next release version
              id: version
              shell: bash
              run: |
                  set -euo pipefail

                  channel="stable"
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    channel="${{ github.event.inputs.release_channel }}"
                  fi

                  bump_input="auto"
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    bump_input="${{ github.event.inputs.bump }}"
                  fi

                  if git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$' >/dev/null; then
                    echo "created=false" >> "$GITHUB_OUTPUT"
                    echo "version=" >> "$GITHUB_OUTPUT"
                    echo "prerelease=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  latest_stable=$(git tag --list 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
                  if [ -z "$latest_stable" ]; then
                    latest_stable="v0.0.0"
                  fi

                  range="$latest_stable..HEAD"
                  commits=$(git log --format=%s%n%b $range || true)

                  bump="$bump_input"
                  if [ "$bump" = "auto" ]; then
                    bump="patch"
                    if echo "$commits" | grep -Eq 'BREAKING CHANGE|^[a-zA-Z]+(\([^)]+\))?!:'; then
                      bump="major"
                    elif echo "$commits" | grep -Eq '^feat(\([^)]+\))?:'; then
                      bump="minor"
                    fi
                  fi

                  base=${latest_stable#v}
                  IFS='.' read -r major minor patch <<< "$base"

                  case "$bump" in
                    major)
                      major=$((major + 1))
                      minor=0
                      patch=0
                      ;;
                    minor)
                      minor=$((minor + 1))
                      patch=0
                      ;;
                    *)
                      patch=$((patch + 1))
                      ;;
                  esac

                  base_version="${major}.${minor}.${patch}"

                  if [ "$channel" = "beta" ]; then
                    latest_beta=$(git tag --list "v${base_version}-beta.*" --sort=-v:refname | grep -E "^v${base_version}-beta\.[0-9]+$" | head -n1 || true)
                    beta_number=1
                    if [ -n "$latest_beta" ]; then
                      beta_number=$(echo "$latest_beta" | sed -E 's/.*-beta\.([0-9]+)$/\1/')
                      beta_number=$((beta_number + 1))
                    fi
                    next_version="v${base_version}-beta.${beta_number}"
                    is_prerelease="true"
                  else
                    next_version="v${base_version}"
                    is_prerelease="false"
                  fi

                  echo "created=true" >> "$GITHUB_OUTPUT"
                  echo "version=$next_version" >> "$GITHUB_OUTPUT"
                  echo "prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

            - name: Create and push git tag
              if: steps.version.outputs.created == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git tag "${{ steps.version.outputs.version }}"
                  git push origin "${{ steps.version.outputs.version }}"

            - name: Create GitHub release
              if: steps.version.outputs.created == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.version }}
                  prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
                  generate_release_notes: true

    installers:
        name: Build and Publish Installers (${{ matrix.name }})
        runs-on: ${{ matrix.os }}
        needs: [quality, release]
        if: needs.release.outputs.created == 'true'
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: Windows
                      os: windows-latest
                      script: npm run dist:ci:win
                    - name: macOS
                      os: macos-latest
                      script: npm run dist:ci:mac

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build and publish platform installer artifacts
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CSC_IDENTITY_AUTO_DISCOVERY: false
              run: ${{ matrix.script }}
