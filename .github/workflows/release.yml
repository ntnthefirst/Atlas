name: Release

# Releases are driven by git tags created with `npm version` (see RELEASE.md).
# Pushing a vX.Y.Z (or vX.Y.Z-beta.N) tag lints, builds, and publishes the
# GitHub release with Windows + macOS installers. The version comes straight
# from the tag — no label policy, no tag-sorting, no version math.
#
# `auto-tag-release.yml` also calls this workflow directly after it creates a
# tag for a version bump that landed on main. That call is deliberate: a tag
# pushed with GITHUB_TOKEN cannot trigger `on: push`, so the automatic path
# would silently do nothing if it relied on the tag trigger alone.
on:
    push:
        tags:
            - "v*"
    workflow_call:
        inputs:
            tag:
                description: The tag to release, e.g. v1.2.0
                required: true
                type: string
            prerelease:
                description: Publish the release as a pre-release
                required: false
                default: false
                type: boolean

concurrency:
    group: release-${{ inputs.tag || github.ref_name }}
    cancel-in-progress: false

jobs:
    quality:
        name: Lint and Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.tag || github.ref_name }}
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run lint --if-present
            - run: npm run build --if-present

    create-release:
        name: Create GitHub Release
        needs: quality
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Create or update the release for this tag
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ inputs.tag || github.ref_name }}
                  prerelease: ${{ inputs.prerelease || contains(inputs.tag || github.ref_name, '-beta') }}
                  generate_release_notes: true

    installers:
        name: Build Installers (${{ matrix.name }})
        needs: [quality, create-release]
        runs-on: ${{ matrix.os }}
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: Windows
                      os: windows-latest
                      args: "--win"
                      asset_glob: |
                          release/Atlas-Setup-Windows-*.exe
                          release/Atlas-Setup-Windows-*.exe.blockmap
                          release/latest*.yml
                    - name: macOS
                      os: macos-latest
                      args: "--mac --arm64"
                      asset_glob: |
                          release/Atlas-Setup-macOS-*.dmg
                          release/Atlas-Setup-macOS-*.zip
                          release/latest*.yml
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.tag || github.ref_name }}
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - name: Build and package
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  CSC_IDENTITY_AUTO_DISCOVERY: false
                  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
              run: |
                  VERSION="${RELEASE_TAG#v}"
                  npm run build
                  npx electron-builder ${{ matrix.args }} --publish never --config.extraMetadata.version="$VERSION"
            - name: Upload installers to the release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ inputs.tag || github.ref_name }}
                  files: ${{ matrix.asset_glob }}
